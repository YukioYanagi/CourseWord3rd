name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  GO_VERSION: "1.26.3"

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec -conf .gosec.json ./...

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod verify
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit && pip-audit -r python/requirements.txt
